<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title (Brand First) -->
    <title>
      Amirthan Oil Mills | Pure Cold Pressed Oils in India
    </title>

    <!-- Primary SEO -->
    <meta
      name="description"
      content="Amirthan Oil Mills – Trusted since 1975 for pure, natural, cold-pressed oils. Premium coconut, sesame, groundnut & traditional oils for healthy families across India."
    />
    <meta
      name="keywords"
      content="Amirthan Oil Mills, cold pressed oils, coconut oil, sesame oil, groundnut oil, traditional oil mill, natural oils India"
    />
    <meta name="author" content="Amirthan Oil Mills" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://amirthanoil.vercel.app/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Amirthan Oil Mills | Pure Cold Pressed Oils" />
    <meta
      property="og:description"
      content="Three generations of expertise in producing pure, cold-pressed oils using traditional methods. Trusted by families across India."
    />
    <meta property="og:url" content="https://www.amirthanoils.com/" />
    <meta property="og:image" content="https://www.amirthanoils.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Amirthan Oil Mills" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Amirthan Oil Mills | Pure Cold Pressed Oils" />
    <meta
      name="twitter:description"
      content="Pure, natural, cold-pressed oils crafted with traditional methods since 1975."
    />
    <meta name="twitter:image" content="https://www.amirthanoils.com/og-image.jpg" />

    <!-- Theme Color (Mobile browsers) -->
    <meta name="theme-color" content="#166534" />

    <!-- Preconnect (Performance) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
  </head>

  <body>
    <div id="root"></div>

    <!-- App -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
